name: Update requirements.txt from Pipfile.lock

on:
  push:
    paths:
      - 'Extract_Metadata_From_ERStudio/dbp01-erstudio-extract/Pipfile.lock'

jobs:
  update-requirements:
    if: github.actor != 'dependabot[bot]'
    runs-on: ubuntu-latest

    permissions:
      contents: write

    defaults:
      run:
        working-directory: Extract_Metadata_From_ERStudio/dbp01-erstudio-extract

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install pipenv
        run: pip install pipenv

      - name: Export requirements.txt from Pipfile.lock
        run: pipenv requirements --exclude-markers > requirements.txt

      - name: Commit and push changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add requirements.txt
          git commit -m "chore: sync requirements.txt from Pipfile.lock" || exit 0
          git push
